<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auth</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #1a1a1a;
    }

    .card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 14px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.75rem;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      background: #1a1a1a;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg { display: block; }

    .brand-name {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .tabs {
      display: flex;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
      margin-bottom: 1.5rem;
    }

    .tab {
      flex: 1;
      padding: 0.5rem 0;
      font-size: 14px;
      font-weight: 400;
      color: #888;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -0.5px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      font-family: inherit;
    }

    .tab.active {
      color: #1a1a1a;
      font-weight: 500;
      border-bottom-color: #1a1a1a;
    }

    .panel { display: none; flex-direction: column; gap: 12px; }
    .panel.active { display: flex; }

    .field { display: flex; flex-direction: column; }

    label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
      letter-spacing: 0.01em;
    }

    input[type=text],
    input[type=email],
    input[type=password] {
      height: 38px;
      padding: 0 12px;
      font-size: 14px;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    input:focus { border-color: rgba(0,0,0,0.5); }

    .row { display: flex; gap: 10px; }
    .row .field { flex: 1; }

    .btn-primary {
      height: 38px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      font-family: inherit;
      letter-spacing: -0.01em;
      margin-top: 4px;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:active { opacity: 0.7; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #bbb;
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: rgba(0,0,0,0.1);
    }

    .btn-social {
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      color: #1a1a1a;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      width: 100%;
    }

    .btn-social:hover { background: #f5f5f3; }

    .forgot {
      text-align: right;
      margin-top: -4px;
    }

    .forgot a, .footer-note a {
      font-size: 12px;
      color: #666;
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
    }

    .footer-note {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 4px;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      color: #fff;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error { background: #c0392b; }
  </style>
</head>
<body>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="2" y="2" width="4" height="4" rx="1" fill="white"/>
          <rect x="8" y="2" width="4" height="4" rx="1" fill="white"/>
          <rect x="2" y="8" width="4" height="4" rx="1" fill="white"/>
          <rect x="8" y="8" width="4" height="4" rx="1" fill="white" opacity="0.4"/>
        </svg>
      </div>
      <span class="brand-name">Acme</span>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Log in</button>
      <button class="tab" onclick="switchTab('signup')">Sign up</button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="panel active" id="panel-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <div class="forgot">
        <a onclick="handleForgotPassword()">Forgot password?</a>
      </div>
      <button class="btn-primary" id="login-btn" onclick="handleLogin()">Continue</button>
      <div class="divider">or</div>
      <button class="btn-social" onclick="handleGoogleAuth()">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M15.68 8.18c0-.57-.05-1.11-.14-1.64H8v3.1h4.3a3.68 3.68 0 0 1-1.6 2.42v2h2.58c1.51-1.39 2.4-3.44 2.4-5.88z" fill="#4285F4"/><path d="M8 16c2.16 0 3.97-.72 5.3-1.94l-2.59-2.01c-.71.48-1.63.76-2.71.76-2.08 0-3.85-1.4-4.48-3.29H.86v2.07A8 8 0 0 0 8 16z" fill="#34A853"/><path d="M3.52 9.52A4.8 4.8 0 0 1 3.27 8c0-.53.09-1.04.25-1.52V4.41H.86A8 8 0 0 0 0 8c0 1.29.31 2.51.86 3.59l2.66-2.07z" fill="#FBBC05"/><path d="M8 3.19c1.17 0 2.22.4 3.05 1.2l2.28-2.28A8 8 0 0 0 .86 4.41l2.66 2.07C4.15 4.6 5.92 3.19 8 3.19z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <p class="footer-note">Don't have an account? <a onclick="switchTab('signup')">Sign up</a></p>
    </div>

    <!-- SIGNUP PANEL -->
    <div class="panel" id="panel-signup">
      <div class="row">
        <div class="field">
          <label>First name</label>
          <input type="text" id="signup-firstname" placeholder="Jane" />
        </div>
        <div class="field">
          <label>Last name</label>
          <input type="text" id="signup-lastname" placeholder="Doe" />
        </div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min. 8 characters" />
      </div>
      <button class="btn-primary" id="signup-btn" onclick="handleSignup()">Create account</button>
      <div class="divider">or</div>
      <button class="btn-social" onclick="handleGoogleAuth()">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M15.68 8.18c0-.57-.05-1.11-.14-1.64H8v3.1h4.3a3.68 3.68 0 0 1-1.6 2.42v2h2.58c1.51-1.39 2.4-3.44 2.4-5.88z" fill="#4285F4"/><path d="M8 16c2.16 0 3.97-.72 5.3-1.94l-2.59-2.01c-.71.48-1.63.76-2.71.76-2.08 0-3.85-1.4-4.48-3.29H.86v2.07A8 8 0 0 0 8 16z" fill="#34A853"/><path d="M3.52 9.52A4.8 4.8 0 0 1 3.27 8c0-.53.09-1.04.25-1.52V4.41H.86A8 8 0 0 0 0 8c0 1.29.31 2.51.86 3.59l2.66-2.07z" fill="#FBBC05"/><path d="M8 3.19c1.17 0 2.22.4 3.05 1.2l2.28-2.28A8 8 0 0 0 .86 4.41l2.66 2.07C4.15 4.6 5.92 3.19 8 3.19z" fill="#EA4335"/></svg>
        Sign up with Google
      </button>
      <p class="footer-note">Already have an account? <a onclick="switchTab('login')">Log in</a></p>
      <p class="footer-note">By signing up you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy</a></p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ─────────────────────────────────────────────
    // STEP 1: Paste your Supabase credentials here
    // ─────────────────────────────────────────────
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';       // e.g. https://xyzxyz.supabase.co
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; // your anon/public key

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ─────────────────────────────────────────────
    // Tab switching
    // ─────────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
      });
      document.getElementById('panel-login').classList.toggle('active', tab === 'login');
      document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
    }

    // ─────────────────────────────────────────────
    // Toast notifications
    // ─────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.className = 'toast', 3000);
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = loading ? 'Please wait...' : btn.dataset.label;
    }

    // Save button labels
    window.addEventListener('DOMContentLoaded', () => {
      ['login-btn', 'signup-btn'].forEach(id => {
        const btn = document.getElementById(id);
        btn.dataset.label = btn.textContent;
      });

      // If user is already logged in, redirect
      sb.auth.getSession().then(({ data }) => {
        if (data.session) window.location.href = 'dashboard.html';
      });
    });

    // ─────────────────────────────────────────────
    // Email + Password — Login
    // ─────────────────────────────────────────────
    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) return showToast('Please fill in all fields.', true);

      setLoading('login-btn', true);
      const { error } = await sb.auth.signInWithPassword({ email, password });
      setLoading('login-btn', false);

      if (error) return showToast(error.message, true);
      showToast('Logged in! Redirecting...');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    }

    // ─────────────────────────────────────────────
    // Email + Password — Sign Up
    // ─────────────────────────────────────────────
    async function handleSignup() {
      const firstName = document.getElementById('signup-firstname').value.trim();
      const lastName = document.getElementById('signup-lastname').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;

      if (!firstName || !lastName || !email || !password)
        return showToast('Please fill in all fields.', true);

      if (password.length < 8)
        return showToast('Password must be at least 8 characters.', true);

      setLoading('signup-btn', true);
      const { error } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: { first_name: firstName, last_name: lastName }
        }
      });
      setLoading('signup-btn', false);

      if (error) return showToast(error.message, true);
      showToast('Check your email to confirm your account!');
    }

    // ─────────────────────────────────────────────
    // Google OAuth
    // ─────────────────────────────────────────────
    async function handleGoogleAuth() {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/dashboard.html'
        }
      });
      if (error) showToast(error.message, true);
    }

    // ─────────────────────────────────────────────
    // Forgot Password
    // ─────────────────────────────────────────────
    async function handleForgotPassword() {
      const email = document.getElementById('login-email').value.trim();
      if (!email) return showToast('Enter your email first, then click Forgot password.', true);

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/auth.html'
      });
      if (error) return showToast(error.message, true);
      showToast('Password reset email sent!');
    }
  </script>
</body>
</html>
